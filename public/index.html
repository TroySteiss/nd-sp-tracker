<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Special Projects Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
<style>
  /* login overlay */
  #login{position:fixed;inset:0;background:var(--canvas);display:none;align-items:center;justify-content:center;z-index:200}
  #login .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow-lg);padding:30px 28px;width:min(380px,92vw)}
  #login .glyph{width:38px;height:38px;border-radius:9px;background:linear-gradient(150deg,var(--wheat),var(--wheat-d));display:grid;place-items:center;font-family:var(--disp);font-weight:700;color:#1b1e26;font-size:18px;margin-bottom:16px}
  #login h1{font-family:var(--disp);font-size:19px;margin:0 0 4px}
  #login p{color:var(--ink-3);font-size:13px;margin:0 0 18px}
  #login input{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:9px;font-size:14px;margin-bottom:12px}
  #login input:focus{outline:2px solid var(--wheat);outline-offset:-1px;border-color:var(--wheat)}
  #login button{width:100%;background:var(--ink);color:#fff;border:0;border-radius:9px;padding:11px;font-weight:600;font-size:14px;cursor:pointer}
  #login button:hover{background:#000}
  #login .err{color:var(--rust);font-size:12.5px;min-height:16px;margin-top:2px}
</style>
</head>
<body>
  <div id="login">
    <div class="card">
      <div class="glyph">SP</div>
      <h1 id="login-title">SP Tracker</h1>
      <p>Special projects &amp; capital expenditures. Enter your name and the team password.</p>
      <form id="login-form" autocomplete="off">
        <input id="login-user" type="text" placeholder="Your name (e.g. First.Last)" autocomplete="username" autofocus>
        <input id="login-pw" type="password" placeholder="Team password" autocomplete="current-password">
        <button type="submit">Sign in</button>
        <div id="login-err" class="err"></div>
      </form>
    </div>
  </div>
  <div id="root"></div>
  <script src="/app.js" defer></script>
</body>
</html>
